bundle:
  name: metric-views

include:
  - resources/*.yml

variables:
  catalog:
    default: "main"
  schema:
    default: "default"
  warehouse_id:
    description: "SQL warehouse ID for running metric view deployment"

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://e2-dogfood.staging.cloud.databricks.com/
    variables:
      catalog: "main"
      schema: "default"
      warehouse_id: "58aa1b363649e722"

  prod:
    mode: production
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com/
      root_path: /Workspace/Users/harsha.pasala@databricks.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: "main"
      schema: "default"
      warehouse_id: "4b9b953939869799"
