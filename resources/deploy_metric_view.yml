resources:
  jobs:
    deploy_billing_metric_view:
      name: "[${bundle.target}] Deploy Billing Usage Metric View"
      tasks:
        - task_key: "create_metric_view_updated_key"
          sql_task:
            file:
              path: ../src/create_metric_view.sql
            warehouse_id: ${var.warehouse_id}
            parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
